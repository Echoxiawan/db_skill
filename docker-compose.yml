services:
  db-inspector-mcp:
    build: .
    image: db-inspector-mcp:latest
    container_name: db-inspector-mcp
    ports:
      # 宿主机端口:容器端口。改左边即可换对外端口
      - "8765:8765"
    volumes:
      # 连接信息持久化到宿主机当前目录下的 ./data
      - ./data:/data
    environment:
      DB_MCP_HOST: "0.0.0.0"
      DB_MCP_PORT: "8765"
      DB_MCP_TRANSPORT: "streamable-http"
      # 开启 HTTPS：未给证书时自动生成自签证书到 /data/certs（重启复用）
      DB_MCP_TLS: "true"
      DB_SKILL_HOME: "/data"
    restart: unless-stopped
